version: "3.8"

services:
  growbolt-sdk:
    image: ghcr.io/nikhilaxponent/growbolt-sdk:latest
    container_name: growbolt-sdk
    restart: unless-stopped
    ports:
      - "5001:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
