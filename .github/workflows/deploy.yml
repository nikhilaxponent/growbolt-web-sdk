name: CI Build, Push & Deploy (SDK)

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/nikhilaxponent/growbolt-sdk:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "docker-compose.yml"
          target: "/var/www/growbolt-sdk"

      - name: Copy nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "deploy/nginx/growbolt.conf"
          target: "/tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e

            APP_DIR=/var/www/growbolt-sdk
            IMAGE=ghcr.io/nikhilaxponent/growbolt-sdk:latest

            echo "Creating app directory..."
            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "Pulling latest image..."
            docker pull $IMAGE

            echo "Removing old container (avoid conflict)..."
            docker rm -f growbolt-sdk || true

            echo "Running docker-compose..."
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose down || true
              docker-compose pull
              docker-compose up -d --force-recreate
            else
              docker compose down || true
              docker compose pull
              docker compose up -d --force-recreate
            fi

            echo "Applying nginx config..."
            sudo rm -f /etc/nginx/sites-enabled/growbolt-sdk || true
            sudo rm -f /etc/nginx/sites-available/growbolt-sdk || true

            sudo mv /tmp/growbolt.conf /etc/nginx/sites-available/growbolt-sdk
            sudo ln -sf /etc/nginx/sites-available/growbolt-sdk /etc/nginx/sites-enabled/growbolt-sdk

            echo "Testing nginx..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Cleaning unused images..."
            docker image prune -af || true

            echo "Deployment complete 🚀"
